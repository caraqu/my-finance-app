<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Finance with Fiancée">
<title>💑 Finance with Fiancée</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #6C63FF; --mine: #34C759; --shared: #FF9F0A;
  --danger: #FF3B30; --bg: #F2F2F7; --card: #FFFFFF;
  --text: #1C1C1E; --text2: #6C6C70; --border: #E5E5EA;
  --shadow: 0 4px 24px rgba(108,99,255,0.10);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: var(--bg); min-height: 100vh; max-width: 430px;
  margin: 0 auto; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
.header {
  background: var(--primary); color: #fff;
  padding: 52px 20px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.sync-btn {
  background: rgba(255,255,255,0.18); border: none; color: #fff;
  padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
}
.sync-btn:active { background: rgba(255,255,255,0.28); }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--card); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 20;
}
.tab {
  flex: 1; padding: 14px 4px 12px; text-align: center; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text2);
  border-bottom: 2.5px solid transparent; transition: all .15s; user-select: none;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ══════════════════════════════════════════════
   MONTH LIST (SwipeWipe 风格)
══════════════════════════════════════════════ */
#monthListView { padding-bottom: 60px; }

.recents-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 26px; height: 112px; cursor: pointer; user-select: none;
  background: linear-gradient(135deg, #00C9A7 0%, #00A8E8 100%);
  transition: opacity .12s;
}
.recents-row:active { opacity: .85; }
.recents-row-text {
  font-size: 54px; font-weight: 900; color: white;
  letter-spacing: -2px; line-height: 1;
}
.recents-badge {
  background: rgba(0,0,0,.22); color: white;
  font-size: 15px; font-weight: 800;
  padding: 5px 14px; border-radius: 20px;
}
.recents-ff { font-size: 22px; color: rgba(255,255,255,.85); margin-left: 10px; }

.month-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 26px; height: 98px; cursor: pointer; user-select: none;
  transition: opacity .12s;
}
.month-row:active { opacity: .85; }
.month-row-text {
  font-size: 44px; font-weight: 900; color: white;
  letter-spacing: -1.5px; line-height: 1;
}
.month-row-text.done { text-decoration: line-through; opacity: .85; }
.month-row-right { display: flex; align-items: center; gap: 10px; }
.month-row-badge {
  background: rgba(0,0,0,.2); color: white;
  font-size: 13px; font-weight: 800;
  padding: 4px 12px; border-radius: 16px;
}
.month-row-done {
  background: rgba(255,255,255,.25); color: white;
  font-size: 13px; font-weight: 800;
  padding: 4px 12px; border-radius: 16px;
}
.month-ff { font-size: 20px; color: rgba(255,255,255,.8); }

/* Month row color palette (cycles) */
.mc0  { background: linear-gradient(135deg, #F72585, #7209B7); }
.mc1  { background: linear-gradient(135deg, #4361EE, #3A0CA3); }
.mc2  { background: linear-gradient(135deg, #F77F00, #D62828); }
.mc3  { background: linear-gradient(135deg, #06D6A0, #118AB2); }
.mc4  { background: linear-gradient(135deg, #FFBE0B, #FB5607); }
.mc5  { background: linear-gradient(135deg, #8338EC, #3A86FF); }
.mc6  { background: linear-gradient(135deg, #FF006E, #FFBE0B); }
.mc7  { background: linear-gradient(135deg, #2D6A4F, #52B788); }
.mc8  { background: linear-gradient(135deg, #E63946, #A8DADC); }
.mc9  { background: linear-gradient(135deg, #6A0572, #AB83A1); }
.mc10 { background: linear-gradient(135deg, #0D3B66, #FAF0CA); }
.mc11 { background: linear-gradient(135deg, #CB4335, #F1948A); }

/* ══════════════════════════════════════════════
   SWIPE CARD VIEW
══════════════════════════════════════════════ */
#swipeCardView { display: none; }

.swipe-mode-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px; background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 49px; z-index: 10;
}
.back-btn {
  background: none; border: none; color: var(--primary);
  font-size: 15px; font-weight: 700; cursor: pointer;
  padding: 6px 10px 6px 0;
  display: flex; align-items: center; gap: 4px;
}
.swipe-mode-title { font-size: 15px; font-weight: 700; color: var(--text); }
.undo-btn {
  background: none; border: none; color: var(--text2);
  font-size: 14px; font-weight: 600; cursor: pointer;
  padding: 6px 0 6px 10px;
  display: flex; align-items: center; gap: 4px;
}
.undo-btn:active { color: var(--primary); }
.undo-btn.has-undo { color: var(--primary); }

.swipe-tab { padding: 20px 20px 100px; min-height: calc(100vh - 160px); }
.swipe-labels {
  display: flex; justify-content: space-between;
  margin-bottom: 16px; font-size: 13px; font-weight: 700;
}
.label-shared { color: var(--shared); }
.label-mine   { color: var(--mine); }

/* Card stack */
.card-stack { position: relative; height: 270px; margin-bottom: 20px; }
.txn-card {
  position: absolute; inset: 0; background: var(--card);
  border-radius: 22px; padding: 22px 22px 16px;
  box-shadow: var(--shadow); cursor: grab;
  user-select: none; touch-action: none; will-change: transform;
  transform-origin: center 110%;
}
.txn-card:active { cursor: grabbing; }
.txn-card.back1 { transform: scale(0.95) translateY(10px); z-index: 0; }
.txn-card.back2 { transform: scale(0.90) translateY(20px); z-index: -1; }
.txn-card.front { z-index: 2; }

.swipe-label {
  position: absolute; top: 20px; padding: 6px 14px; border-radius: 10px;
  font-size: 15px; font-weight: 800; opacity: 0; pointer-events: none;
  border: 2.5px solid; transition: opacity .05s;
}
.swipe-label.left  { right:18px; color:var(--shared); border-color:var(--shared); background:rgba(255,159,10,.08); }
.swipe-label.right { left: 18px; color:var(--mine);   border-color:var(--mine);   background:rgba(52,199,89,.08); }

.card-merchant { font-size: 19px; font-weight: 700; color: var(--text); margin-bottom: 7px; line-height: 1.3; }
.card-amount   { font-size: 34px; font-weight: 800; color: var(--primary); margin-bottom: 10px; letter-spacing: -1px; }
.card-tags     { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
.card-tag      { background: var(--bg); padding: 3px 9px; border-radius: 7px; font-size: 11px; color: var(--text2); }

.card-cat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 11px; border-radius: 10px; font-size: 12px; font-weight: 700;
}
.card-cat-badge.confirmed { background: rgba(108,99,255,.1); color: var(--primary); }
.card-cat-badge.auto      { background: rgba(255,159,10,.12); color: #9A5700; }
.card-cat-badge.unknown   { background: rgba(255,59,48,.08);  color: var(--danger); }
.card-tap-hint { position: absolute; bottom: 12px; right: 16px; font-size: 10px; color: var(--text2); opacity: .6; }

/* Action buttons */
.action-row {
  display: flex; align-items: center; justify-content: center; gap: 20px;
}
.action-btn {
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; transition: transform .15s, box-shadow .15s;
  box-shadow: 0 3px 12px rgba(0,0,0,.12);
}
.action-btn:active { transform: scale(.92) !important; }
.btn-shared { width: 64px; height: 64px; background: #FFF3E0; }
.btn-undo   { width: 52px; height: 52px; background: #F5F5F5; font-size: 22px; }
.btn-mine   { width: 64px; height: 64px; background: #E8F5E9; }
.action-btn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(0,0,0,.18); }

.remaining { text-align: center; font-size: 12px; color: var(--text2); margin-top: 14px; }

.empty-state {
  display: none; flex-direction: column; align-items: center;
  padding: 60px 20px 20px; text-align: center;
}
.empty-state .big-emoji { font-size: 72px; margin-bottom: 16px; }
.empty-state h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.empty-state p  { font-size: 14px; color: var(--text2); line-height: 1.5; }

/* ── CATEGORY MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 50; justify-content: flex-end; flex-direction: column;
  max-width: 430px; margin: 0 auto;
}
.overlay.show { display: flex; }
.cat-sheet {
  background: var(--card); border-radius: 26px 26px 0 0;
  padding: 22px 20px 36px;
  animation: slideUp .28s cubic-bezier(.32,0,.67,0) forwards;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle { width:38px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
.sheet-title    { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.sheet-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
.cat-grid { margin-bottom: 18px; }
.cat-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 12px 4px; border-radius: 16px; border: 2px solid var(--border);
  background: var(--card); cursor: pointer; transition: border-color .15s, background .15s;
}
.cat-btn .em { font-size: 24px; }
.cat-btn .nm { font-size: 11px; color: var(--text2); font-weight: 500; }
.cat-btn.sel { border-color: var(--primary); background: rgba(108,99,255,.06); }
.cat-btn.sel .nm { color: var(--primary); font-weight: 700; }
.cat-btn.auto-suggested { border-color: var(--shared); background: rgba(255,159,10,.06); position: relative; }
.cat-btn.auto-suggested::after {
  content: '🤖'; position: absolute; top:-7px; right:-7px; font-size:13px;
  background:white; border-radius:50%; width:20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.cat-btn.auto-suggested.sel { border-color: var(--primary); background: rgba(108,99,255,.06); }
.auto-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,159,10,.12); color: #9A5700;
  font-size: 12px; font-weight: 600; padding: 4px 10px;
  border-radius: 8px; margin-bottom: 12px;
}
.confirm-btn {
  width: 100%; padding: 16px; background: var(--primary); color: #fff;
  border: none; border-radius: 16px; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.confirm-btn:active { opacity: .85; }
.confirm-btn:disabled { background: var(--border); color: var(--text2); cursor: default; }

/* ── REPORT TAB ── */
.report-tab { padding: 20px 16px 100px; }
.month-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; margin-bottom: 10px;
}
.mnav-btn {
  background: var(--card); border: none; width:36px; height:36px;
  border-radius:50%; font-size:20px; cursor:pointer; color:var(--primary);
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.month-label { font-size: 17px; font-weight: 700; min-width: 110px; text-align: center; }
.today-btn {
  background: var(--bg); border: 1px solid var(--border); color: var(--primary);
  font-size: 12px; font-weight: 700; padding: 5px 12px;
  border-radius: 12px; cursor: pointer;
}
.today-btn:active { background: rgba(108,99,255,.08); }

.progress-card { background:var(--card); border-radius:18px; padding:16px; margin-bottom:14px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.progress-card h3 { font-size:14px; font-weight:700; margin-bottom:12px; color:var(--text2); }
.progress-row { margin-bottom: 10px; }
.progress-row:last-child { margin-bottom: 0; }
.progress-header { display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:600; margin-bottom:5px; }
.pending-badge { font-size:11px; background:rgba(255,59,48,.1); color:var(--danger); padding:2px 8px; border-radius:8px; font-weight:700; }
.done-badge    { font-size:11px; background:rgba(52,199,89,.12); color:var(--mine); padding:2px 8px; border-radius:8px; font-weight:700; }
.progress-bar-bg { background:var(--border); border-radius:4px; height:8px; overflow:hidden; }
.progress-bar-fill { height:100%; border-radius:4px; transition:width .6s cubic-bezier(.34,1.56,.64,1); }

.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.sum-card { background:var(--card); border-radius:18px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.sum-card.hero { grid-column:1/-1; }
.sum-label { font-size:12px; color:var(--text2); margin-bottom:6px; font-weight:500; }
.sum-card.hero .sum-label { color:rgba(255,255,255,.75); }
.sum-value { font-size:26px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
.sum-card.hero .sum-value { color:#fff; font-size:34px; }
.breakdown-card { background:var(--card); border-radius:18px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,.06); margin-bottom:16px; }
.breakdown-card h3 { font-size:15px; font-weight:700; margin-bottom:12px; }
.brow { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--border); }
.brow:last-child { border-bottom:none; }
.brow-left { display:flex; align-items:center; gap:10px; }
.brow-emoji { font-size:22px; }
.brow-name  { font-size:14px; font-weight:600; }
.brow-right { text-align:right; }
.brow-amount { font-size:15px; font-weight:700; }
.brow-sub    { font-size:11px; color:var(--text2); margin-top:2px; }
.report-footer { text-align:center; font-size:12px; color:var(--text2); padding:8px 0 24px; }

/* ── ACCOUNTS ── */
.accounts-tab { padding: 20px 16px 100px; }
.account-card { background:var(--card); border-radius:16px; padding:16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; box-shadow:0 1px 6px rgba(0,0,0,.06); }
.acc-icon { font-size:32px; }
.acc-name   { font-size:15px; font-weight:600; }
.acc-status { font-size:12px; color:var(--mine); margin-top:2px; }
.add-btn { width:100%; padding:16px; background:var(--card); color:var(--primary); border:2px dashed var(--primary); border-radius:16px; font-size:15px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
.add-btn:active { background:rgba(108,99,255,.05); }
.plaid-note { text-align:center; font-size:12px; color:var(--text2); margin-top:14px; }

/* ── CATEGORY DETAIL ── */
.cat-detail-list { overflow-y:auto; max-height:54vh; padding:0 2px 4px; }
.cat-detail-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.cat-detail-row:last-child { border-bottom:none; }
/* ── RECAT SPLIT BUTTONS ── */
.recat-split-btn {
  padding:10px 4px; border:2px solid var(--border); background:var(--card);
  border-radius:12px; font-size:12px; font-weight:700; cursor:pointer;
  color:var(--text2); transition:all .15s; text-align:center; width:100%;
}
.recat-split-btn.sel { border-color:var(--primary); background:rgba(108,99,255,.08); color:var(--primary); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:88px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(28,28,30,.85); backdrop-filter:blur(8px); color:#fff;
  padding:10px 20px; border-radius:22px; font-size:14px; font-weight:500;
  opacity:0; transition:all .25s; pointer-events:none; z-index:999;
  max-width:85vw; text-align:center; word-break:break-word; line-height:1.4;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── SETTLEMENT PERIOD ── */
.settlement-section {
  background: var(--card); border-radius: 16px; padding: 16px 18px;
  margin: 0 16px 12px; box-shadow: var(--shadow);
}
.settlement-section h4 {
  font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.settlement-active-bar {
  background: linear-gradient(135deg, #6C63FF, #A78BFA);
  border-radius: 12px; padding: 10px 14px; color: white;
  font-size: 13px; margin-bottom: 8px; display: flex;
  justify-content: space-between; align-items: center;
}
.settlement-date-row {
  display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
}
.settlement-date-row input[type="date"] {
  flex: 1; padding: 8px 10px; border: 1.5px solid var(--border);
  border-radius: 10px; font-size: 13px; color: var(--text);
  background: var(--bg); min-width: 130px;
}
.settlement-btn {
  padding: 8px 16px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.settlement-btn.set { background: var(--primary); color: white; }
.settlement-btn.clear { background: var(--danger); color: white; }
</style>
</head>
<body>

<div class="header">
  <h1>💑 Finance with Fiancée</h1>
  <button class="sync-btn" id="syncBtn" onclick="syncTransactions()">
    <span id="syncIcon">🔄</span> 同步
  </button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="swipe"    onclick="showTab('swipe',this)">💳 分类</div>
  <div class="tab"        data-tab="report"   onclick="showTab('report',this)">📊 报告</div>
  <div class="tab"        data-tab="accounts" onclick="showTab('accounts',this)">🏦 账户</div>
</div>

<!-- ── SWIPE TAB ── -->
<div id="tab-swipe" class="tab-content active">

  <!-- 月份列表 (默认显示) -->
  <div id="monthListView">
    <div id="monthListRows"></div>
  </div>

  <!-- 刷卡界面 (点进月份后显示) -->
  <div id="swipeCardView">
    <div class="swipe-mode-header">
      <button class="back-btn" onclick="exitSwipeMode()">‹ 返回</button>
      <span class="swipe-mode-title" id="swipeModeTitle">记账</span>
      <button class="undo-btn" id="undoBtnHeader" onclick="undoLast()">↩ 撤回</button>
    </div>
    <div class="swipe-tab">
      <div class="swipe-labels">
        <span class="label-shared">← 👩‍❤️‍👩 共享</span>
        <span class="label-mine">恐龙公主 🦕 →</span>
      </div>
      <div class="card-stack" id="cardStack"></div>
      <div class="remaining" id="remaining"></div>
      <div class="action-row" id="actionRow" style="margin-top:24px">
        <button class="action-btn btn-shared" onclick="triggerSwipe('shared')" title="共享">💑</button>
        <button class="action-btn btn-undo"   onclick="undoLast()"             title="撤回">↩</button>
        <button class="action-btn btn-mine"   onclick="triggerSwipe('mine')"   title="我的">🦕</button>
      </div>
      <div style="text-align:center;margin-top:10px">
        <button id="theirsBtn" onclick="triggerSwipe('theirs')"
          style="background:#FFF0F0;border:1.5px solid #FF9999;color:#AA3333;
                 border-radius:16px;padding:8px 22px;font-size:13px;font-weight:700;
                 cursor:pointer;opacity:.9">
          🐗 野猪公主独享
        </button>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="big-emoji">🎉</div>
        <h3>本月全部记完！</h3>
        <p>返回查看其他月份<br>或去报告页查看汇总</p>
      </div>
    </div>
  </div>
</div>

<!-- ── REPORT TAB ── -->
<div id="tab-report" class="tab-content">
  <div class="report-tab">
    <div class="month-nav">
      <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel">—</span>
      <button class="mnav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div style="text-align:center;margin-bottom:14px">
      <button class="today-btn" onclick="goToCurrentMonth()">📅 跳到本月</button>
    </div>
    <div style="display:flex;background:var(--border);border-radius:12px;padding:3px;margin-bottom:16px">
      <button id="toggleMe"       onclick="setView('me')"       style="flex:1;padding:8px;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;background:var(--primary);color:white;transition:all .2s">🦕 恐龙公主</button>

<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script>
// ══ OAuth ══
async function handleOAuthRedirect() {
  if (!window.location.href.includes('oauth_state_id')) return;
  try {
    const r = await fetch('/api/get_link_token');
    const data = await r.json();
    if (!data.link_token) return;
    Plaid.create({ token: data.link_token, onSuccess: openOwnerModal,
      onExit: (err) => { if(err) toast('❌ ' + (err.error_message||'连接取消')); }
    }).open();
  } catch(e) {}
}

// ══ DATA ══
const CATEGORIES = [
  { id:'food',          em:'🍜', nm:'吃饭'   },
  { id:'grocery',       em:'🛒', nm:'超市'   },
  { id:'amazon',        em:'📦', nm:'Amazon' },
  { id:'cat',           em:'🐱', nm:'小猫'   },
  { id:'transport',     em:'🚗', nm:'交通'   },
  { id:'shopping',      em:'👗', nm:'购物'   },
  { id:'entertainment', em:'🎮', nm:'娱乐'   },
  { id:'health',        em:'💊', nm:'医疗'   },
  { id:'home',          em:'🏠', nm:'家居'   },
  { id:'travel',        em:'✈️', nm:'旅行'   },
  { id:'subscription',  em:'📱', nm:'订阅'   },
  { id:'parents',       em:'👨‍👩‍👧', nm:'爸妈'   },
  { id:'photo',         em:'📷', nm:'摄影'   },
  { id:'fitness',       em:'💪', nm:'健身'   },
  { id:'study',         em:'📚', nm:'学习'   },
  { id:'unknown',       em:'❓', nm:'未知'   },
  { id:'other',         em:'💳', nm:'其他'   },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

// 人物设定（改名字改这里就够了）
const ME      = { name: '恐龙公主', em: '🦕' };
const PARTNER = { name: '野猪公主', em: '🐗' };

const MONTH_LABELS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

let transactions   = [];
let cardIndex      = 0;
let pendingId      = null;
let pendingSplit   = null;
let selectedCat    = null;
let currentSwipeMonth = null; // null = all recents, 'YYYY-MM' = specific month
let currentMonth   = new Date().toISOString().slice(0,7); // for report tab
let reportView     = 'me';
let reportData     = null;
let progressData   = null;
let pendingOwner   = null;
let pendingPublicToken = null;
let pendingInstName    = null;
let dragging = false, startX = 0, startY = 0, deltaX = 0, deltaY = 0;
const preCatMap = new Map();  // txnId → categoryId (点击预选的)
const undoStack = [];         // [{id, name, amount, split, category, ...full txn}]

// ══ TOAST ══
function toast(msg, dur=2400) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ══ TABS ══
function showTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'report')   loadReport();
  if (name === 'accounts') loadAccounts();
}

// ══ MONTH LIST ══════════════════════════════════════════════
function formatMonthLabel(monthStr) {
  const d = new Date(monthStr + '-01T12:00:00');
  return `${MONTH_LABELS[d.getMonth()]} '${String(d.getFullYear()).slice(2)}`;
}

async function loadMonthList() {
  try {
    const r    = await fetch('/api/months');
    const data = await r.json();
    renderMonthList(data.months || [], data.total_pending || 0);
  } catch(e) { toast('⚠️ 无法连接服务器'); }
}

function renderMonthList(months, totalPending) {
  const container = document.getElementById('monthListRows');

  // Recents row (all uncategorized)
  const recentsBadge = totalPending > 0
    ? `<span class="recents-badge">${totalPending}</span><span class="recents-ff">▶▶</span>`
    : `<span class="recents-badge">✓ 全部完成</span>`;

  let html = `
    <div class="recents-row" onclick="enterSwipeMode(null)">
      <span class="recents-row-text">All</span>
      <div style="display:flex;align-items:center;gap:8px">${recentsBadge}</div>
    </div>`;

  months.forEach((m, i) => {
    const isDone  = m.pending === 0 && m.total > 0;
    const label   = formatMonthLabel(m.month);
    const badge   = isDone
      ? `<span class="month-row-done">✓ 完成</span>`
      : `<span class="month-row-badge">${m.pending} 笔</span>`;
    html += `
      <div class="month-row mc${i % 12}" onclick="enterSwipeMode('${m.month}')">
        <span class="month-row-text${isDone ? ' done' : ''}">${label}</span>
        <div class="month-row-right">${badge}<span class="month-ff">▶▶</span></div>
      </div>`;
  });

  container.innerHTML = html;
}

// ══ ENTER / EXIT SWIPE MODE ══════════════════════════════════
async function enterSwipeMode(month) {
  currentSwipeMonth = month;
  document.getElementById('monthListView').style.display  = 'none';
  document.getElementById('swipeCardView').style.display  = 'block';
  const title = month ? formatMonthLabel(month) : 'recents';
  document.getElementById('swipeModeTitle').textContent = title;
  undoStack.length = 0;
  updateUndoBtn();
  await loadTransactionsForMode();
}

function exitSwipeMode() {
  document.getElementById('swipeCardView').style.display  = 'none';
  document.getElementById('monthListView').style.display  = 'block';
  loadMonthList(); // refresh counts
}

async function loadTransactionsForMode() {
  try {
    const url = currentSwipeMonth
      ? `/api/transactions?month=${currentSwipeMonth}`
      : '/api/transactions';
    const r = await fetch(url);
    transactions = await r.json();
    cardIndex = 0;
    renderStack();
  } catch(e) { toast('⚠️ 无法连接服务器'); }
}

// ══ CARD STACK ══════════════════════════════════════════════
function renderStack() {
  const stack   = document.getElementById('cardStack');
  const empty   = document.getElementById('emptyState');
  const actions = document.getElementById('actionRow');
  const labels  = document.querySelector('.swipe-labels');
  const rem     = document.getElementById('remaining');
  const remaining = transactions.slice(cardIndex);

  if (remaining.length === 0) {
    stack.style.display = actions.style.display = labels.style.display = rem.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  stack.style.display = 'block';
  actions.style.display = 'flex';
  labels.style.display  = 'flex';
  rem.style.display     = 'block';
  empty.style.display   = 'none';

  const autoCount = remaining.filter(t => preCatMap.has(t.id) || t.auto_category).length;
  rem.textContent = `还剩 ${remaining.length} 笔 · 已识别 ${autoCount} 笔`;

  // 动态更新「独享」按钮：根据当前这笔是谁的卡
  const btn = document.getElementById('theirsBtn');
  if (btn) {
    const isPartnerCard = remaining[0]?.payer === 'partner';
    btn.textContent = isPartnerCard ? `🦕 恐龙公主独享` : `🐗 野猪公主独享`;
  }

  stack.innerHTML = '';
  remaining.slice(0, 3).slice().reverse().forEach((txn, revIdx) => {
    const idx = Math.min(remaining.length,3) - 1 - revIdx;
    const card = buildCard(txn);
    if (idx === 0) card.classList.add('front');
    else if (idx === 1) card.classList.add('back1');
    else card.classList.add('back2');
    stack.appendChild(card);
  });
  setupDrag(stack.lastElementChild);
}

function buildCard(txn) {
  const card = document.createElement('div');
  card.className = 'txn-card';
  card.dataset.id = txn.id;
  const date = new Date(txn.date + 'T12:00:00').toLocaleDateString('zh-CN', { month:'long', day:'numeric' });
  const topCat = txn.plaid_category?.[0]
    ? `<span class="card-tag">${txn.plaid_category[0]}</span>` : '';

  const preCat  = preCatMap.get(txn.id);
  const autoCat = txn.auto_category;
  let catBadge;
  if (preCat && CAT_MAP[preCat]) {
    catBadge = `<span class="card-cat-badge confirmed">✏️ ${CAT_MAP[preCat].em} ${CAT_MAP[preCat].nm}</span>`;
  } else if (autoCat && CAT_MAP[autoCat]) {
    catBadge = `<span class="card-cat-badge auto">🤖 ${CAT_MAP[autoCat].em} ${CAT_MAP[autoCat].nm}</span>`;
  } else {
    catBadge = `<span class="card-cat-badge unknown">❓ 点击选分类</span>`;
  }

  card.innerHTML = `
    <div class="swipe-label left">👩‍❤️‍👩 共享</div>
    <div class="swipe-label right">🦕 我的</div>
    <div class="card-merchant">${escHtml(txn.name)}</div>
    <div class="card-amount">$${txn.amount.toFixed(2)}</div>
    <div class="card-tags">
      <span class="card-tag">📅 ${date}</span>
      <span class="card-tag">💳 ${escHtml(txn.account)}</span>
      ${topCat}
    </div>
    ${catBadge}
    <div class="card-tap-hint">点击改分类</div>`;
  return card;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Drag ──
function setupDrag(card) {
  if (!card) return;
  card.addEventListener('pointerdown', onDown, { passive: true });
}
function onDown(e) {
  if (e.button && e.button !== 0) return;
  dragging = true;
  startX = e.clientX ?? 0;
  startY = e.clientY ?? 0;
  deltaX = deltaY = 0;
  const card = e.currentTarget;
  card.setPointerCapture(e.pointerId);
  card.addEventListener('pointermove', onMove);
  card.addEventListener('pointerup',   onUp);
  card.addEventListener('pointercancel', onUp);
}
function onMove(e) {
  if (!dragging) return;
  deltaX = (e.clientX ?? 0) - startX;
  deltaY = (e.clientY ?? 0) - startY;
  const card = e.currentTarget;
  card.style.transition = 'none';
  card.style.transform  = `translateX(${deltaX}px) rotate(${deltaX * 0.07}deg)`;
  const lbl = card.querySelector('.swipe-label.left');
  const rbl = card.querySelector('.swipe-label.right');
  const T = 55;
  if (deltaX < -T) { lbl.style.opacity = Math.min(1,(-deltaX-T)/70); rbl.style.opacity=0; }
  else if (deltaX > T) { rbl.style.opacity = Math.min(1,(deltaX-T)/70); lbl.style.opacity=0; }
  else { lbl.style.opacity = rbl.style.opacity = 0; }
}
function onUp(e) {
  if (!dragging) return;
  dragging = false;
  const card = e.currentTarget;
  card.removeEventListener('pointermove', onMove);
  card.removeEventListener('pointerup',   onUp);
  card.removeEventListener('pointercancel', onUp);

  // 轻触 → 打开分类选择器
  if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
    card.style.transition = 'transform .2s ease';
    card.style.transform  = '';
    openCategorySheet(card.dataset.id, null); // null = 预选模式
    return;
  }

  if (deltaX < -90)      flyOff(card, 'shared');
  else if (deltaX > 90)  flyOff(card, 'mine');
  else {
    card.style.transition = 'transform .3s cubic-bezier(.175,.885,.32,1.275)';
    card.style.transform  = '';
    card.querySelector('.swipe-label.left').style.opacity  = 0;
    card.querySelector('.swipe-label.right').style.opacity = 0;
    setTimeout(() => { card.style.transition = ''; }, 320);
  }
}

function flyOff(card, split) {
  const txnId = card.dataset.id;
  const txn   = transactions.find(t => t.id === txnId);
  const cat   = preCatMap.get(txnId) || txn?.auto_category;

  const dir = split === 'shared' ? -1 : 1;
  card.style.transition = 'transform .35s ease, opacity .35s ease';
  card.style.transform  = `translateX(${dir * 520}px) rotate(${dir * 22}deg)`;
  card.style.opacity    = '0';
  card.style.pointerEvents = 'none';

  if (cat && CAT_MAP[cat]) {
    // ✅ 已知分类：直接保存，不弹框
    setTimeout(() => saveTransaction(txnId, split, cat), 220);
  } else {
    // ❓ 未知分类：弹框让用户选
    setTimeout(() => openCategorySheet(txnId, split), 220);
  }
}

function triggerSwipe(split) {
  const stack = document.getElementById('cardStack');
  const front = stack.querySelector('.txn-card.front') || stack.lastElementChild;
  if (front?.classList.contains('txn-card')) flyOff(front, split);
}

// ══ SAVE / UNDO ══════════════════════════════════════════════
async function saveTransaction(txnId, split, category) {
  const txn = transactions.find(t => t.id === txnId);
  try {
    await fetch('/api/categorize', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: txnId, split, category })
    });
    if (txn) undoStack.push({ ...txn, _split: split, _category: category });
    updateUndoBtn();
    const c = CAT_MAP[category] || { em:'', nm: category };
    const icon = split === 'mine' ? ME.em : split === 'theirs' ? PARTNER.em : '💑';
    toast(`${icon} ${c.em} ${c.nm}`);
    preCatMap.delete(txnId);
    cardIndex++;
    renderStack();
  } catch(e) { toast('❌ 保存失败，请重试'); }
}

async function undoLast() {
  if (!undoStack.length) { toast('没有可撤回的记录 ↩'); return; }
  const last = undoStack.pop();
  updateUndoBtn();
  try {
    await fetch('/api/uncategorize', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id: last.id })
    });
    // 把交易对象放回队列前端
    last.categorized = false;
    const idx = transactions.findIndex(t => t.id === last.id);
    if (idx === -1) transactions.splice(cardIndex, 0, last);
    cardIndex = Math.max(0, cardIndex - 1);
    renderStack();
    toast('↩ 已撤回上一笔');
  } catch(e) { toast('撤回失败'); }
}

function updateUndoBtn() {
  const btn = document.getElementById('undoBtnHeader');
  if (!btn) return;
  btn.classList.toggle('has-undo', undoStack.length > 0);
  btn.style.opacity = undoStack.length > 0 ? '1' : '0.4';
}

// ══ CATEGORY SHEET ══════════════════════════════════════════
function openCategorySheet(txnId, split) {
  pendingId    = txnId;
  pendingSplit = split; // null = 预选模式

  const txn    = transactions.find(t => t.id === txnId);
  const curCat = preCatMap.get(txnId) || txn?.auto_category || null;
  selectedCat  = curCat;

  if (split === null) {
    document.getElementById('sheetTitle').textContent = '🏷️ 选择分类';
    document.getElementById('sheetBadge').innerHTML   =
      curCat
        ? `<div class="auto-badge">当前：${CAT_MAP[curCat]?.em||''} ${CAT_MAP[curCat]?.nm||curCat} · 可直接确认或重选</div>`
        : `<div style="font-size:13px;color:var(--text2);margin-bottom:12px">选好分类后再左滑(共享)/右滑(我的)</div>`;
  } else {
    document.getElementById('sheetTitle').textContent =
      split === 'mine' ? `🦕 ${ME.name}的花费` : `💑 共同花费`;
    document.getElementById('sheetBadge').innerHTML =
      `<div style="font-size:13px;color:var(--text2);margin-bottom:12px">请选一个类别</div>`;
  }

  document.getElementById('sheetSub').textContent = `${txn?.name}  ·  $${txn?.amount.toFixed(2)}`;

  document.getElementById('catGrid').innerHTML =
    `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">` +
    CATEGORIES.map(c => {
      const isHighlight = c.id === curCat;
      return `<button class="cat-btn${isHighlight ? ' auto-suggested sel' : ''}"
        onclick="selectCat('${c.id}',this)">
        <span class="em">${c.em}</span><span class="nm">${c.nm}</span>
      </button>`;
    }).join('') + `</div>`;

  const btn = document.getElementById('confirmBtn');
  if (curCat && CAT_MAP[curCat]) {
    btn.disabled    = false;
    btn.textContent = split === null
      ? `确认分类 — ${CAT_MAP[curCat].em} ${CAT_MAP[curCat].nm}`
      : `确认 — ${CAT_MAP[curCat].em} ${CAT_MAP[curCat].nm}`;
  } else {
    btn.disabled    = true;
    btn.textContent = '请选择一个类别';
  }
  document.getElementById('overlay').classList.add('show');
}

function selectCat(id, el) {

}

async function confirmCategory() {
  if (!selectedCat) return;
  document.getElementById('overlay').classList.remove('show');

  if (pendingSplit === null) {
    // 预选模式：只保存到本地，等用户滑动
    preCatMap.set(pendingId, selectedCat);

    toast(`已选 ${c.em} ${c.nm} · 左滑共享 / 右滑我的`);
    renderStack();

  await saveTransaction(pendingId, pendingSplit, selectedCat);

// ══ REPORT ══
function goToCurrentMonth() {
  const now = new Date();
  // 用本地时间避免时区偏移
  currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  loadReport();
}
function changeMonth(d) {
  // 直接操作年月数字，完全避免 Date 时区问题
  let [y, m] = currentMonth.split('-').map(Number);
  m += d;
  if (m > 12) { y++; m = 1; }
  if (m < 1)  { y--; m = 12; }
  currentMonth = `${y}-${String(m).padStart(2,'0')}`;
  loadReport();
}
function setView(v) {
  reportView = v;
  ['me','partner','combined'].forEach(id => {
    const btn = document.getElementById('toggle' + id.charAt(0).toUpperCase() + id.slice(1));
    if (!btn) return;
    btn.style.background = id === v ? 'var(--primary)' : 'transparent';
    btn.style.color      = id === v ? 'white' : 'var(--text2)';
  });
  if (reportData) renderReport(reportData);
  // Show/hide settlement section for combined view
  const settlEl = document.getElementById('settlementSection');
  if (settlEl) settlEl.style.display = (v === 'combined') ? '' : 'none';
}
// ── Settlement Period Helpers ──
function getReportUrl() {
  const sd = localStorage.getItem('settlementStart');
  const ed = localStorage.getItem('settlementEnd');
  if (sd) {
    const endPart = ed ? `&end_date=${ed}` : '';
    return `/api/report?month=${currentMonth}&start_date=${sd}${endPart}`;
  }
  return `/api/report?month=${currentMonth}`;
}
function applySettlement() {
  const start = document.getElementById('settlementStartInput').value;
  const end = document.getElementById('settlementEndInput').value;
  if (!start) { alert('请选择开始日期'); return; }
  localStorage.setItem('settlementStart', start);
  if (end) localStorage.setItem('settlementEnd', end);
  else localStorage.removeItem('settlementEnd');
  updateSettlementUI();
  loadReport();
}
function clearSettlement() {
  localStorage.removeItem('settlementStart');
  localStorage.removeItem('settlementEnd');
  updateSettlementUI();
  loadReport();
}
function updateSettlementUI() {
  const sd = localStorage.getItem('settlementStart');
  const ed = localStorage.getItem('settlementEnd');
  const bar = document.getElementById('settlementActiveBar');
  const label = document.getElementById('settlementActiveLabel');
  if (!bar) return;
  if (sd) {
    bar.style.display = '';
    label.textContent = '结算周期：' + sd + (ed ? ' → ' + ed : ' → 今天');
    const si = document.getElementById('settlementStartInput');
    const ei = document.getElementById('settlementEndInput');
    if (si) si.value = sd;
    if (ei) ei.value = ed || '';
  } else {
    bar.style.display = 'none';
  }
}

async function loadReport() {
  const label = new Date(currentMonth + '-01T12:00:00').toLocaleDateString('zh-CN', { year:'numeric', month:'long' });
  document.getElementById('monthLabel').textContent = label;
  try {
    const [rr, rp] = await Promise.all([
      fetch(getReportUrl()),
      fetch(`/api/progress?month=${currentMonth}`)
    ]);
    reportData   = await rr.json();
    progressData = await rp.json();
    renderProgress(progressData);
    renderReport(reportData);
  } catch(e) {
    document.getElementById('reportContent').innerHTML =
      '<p style="text-align:center;color:var(--text2);padding:40px">加载失败</p>';
  }
}
function renderProgress(prog) {
  if (!prog) { document.getElementById('progressSection').innerHTML = ''; return; }
  const me = prog.me, pa = prog.partner;
  const mePct = me.total > 0 ? Math.round(me.done / me.total * 100) : 0;
  const paPct = pa.total > 0 ? Math.round(pa.done / pa.total * 100) : 0;
  const badge = (p) => p.pending===0 && p.total>0
    ? `<span class="done-badge">✓ 完成</span>`
    : p.pending>0
      ? `<span class="pending-badge">${p.pending} 笔待分类</span>`
      : `<span style="font-size:11px;color:var(--text2)">暂无记录</span>`;
  document.getElementById('progressSection').innerHTML = `
    <div class="progress-card">
      <h3>📋 ${MONTH_LABELS[Number(currentMonth.split('-')[1])-1]} '${currentMonth.slice(2,4)} 记账进度</h3>
      <div class="progress-row">
        <div class="progress-header"><span>${ME.em} ${ME.name}（${me.done}/${me.total} 笔）</span>${badge(me)}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${mePct}%;background:var(--mine)"></div></div>
      </div>
      <div class="progress-row">
        <div class="progress-header"><span>${PARTNER.em} ${PARTNER.name}（${pa.done}/${pa.total} 笔）</span>${badge(pa)}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${paPct}%;background:var(--primary)"></div></div>
      </div>
      ${prog.both_cleared
        ? `<div style="margin-top:12px;text-align:center;font-size:13px;font-weight:700;color:var(--mine)">🎉 两人本月均已记完！</div>`
        : `<div style="margin-top:10px;text-align:center;font-size:12px;color:var(--text2)">两人都记完才能结清</div>`}
    </div>`;
}
function renderReport(data) {
  const cleared = progressData?.both_cleared;
  const net = data.net_balance || 0;
  let netCard;
  if (!cleared) {
    netCard = `<div class="sum-card hero" style="background:#8E8E93">
      <div class="sum-label" style="color:rgba(255,255,255,.8)">⏳ 账单记录中…</div>
      <div class="sum-value" style="color:white;font-size:18px">等两人都记完再结算</div></div>`;
  } else if (net === 0) {
    netCard = `<div class="sum-card hero" style="background:#34C759">
      <div class="sum-label" style="color:rgba(255,255,255,.8)">🎉 本月两清了！</div>
      <div class="sum-value" style="color:white;font-size:22px">互不相欠 💑</div></div>`;
  } else if (net > 0) {
    netCard = `<div class="sum-card hero" style="background:var(--shared)">
      <div class="sum-label" style="color:rgba(255,255,255,.8)">${PARTNER.name} 欠你 💸</div>
      <div class="sum-value" style="color:white">$${Math.abs(net).toFixed(2)}</div></div>`;
  } else {
    netCard = `<div class="sum-card hero" style="background:var(--danger)">
      <div class="sum-label" style="color:rgba(255,255,255,.8)">你欠 ${PARTNER.name} 💸</div>
      <div class="sum-value" style="color:white">$${Math.abs(net).toFixed(2)}</div></div>`;
  }
  let summaryCards = '';
  if (reportView === 'me') {
    summaryCards = `${netCard}
      <div class="sum-card"><div class="sum-label">${ME.em} ${ME.name}自己的</div><div class="sum-value">$${(data.me_own||0).toFixed(2)}</div></div>
      <div class="sum-card"><div class="sum-label">💑 共享（我的一半）</div><div class="sum-value">${((data.total_shared||0)*.5).toFixed(2)}</div></div>`

  } else if (reportView === 'partner') {
    summaryCards = `${netCard}
      <div class="sum-card"><div class="sum-label">${PARTNER.em} ${PARTNER.name}自己的</div><div class="sum-value">$${(data.partner_own||0).toFixed(2)}</div></div>
      <div class="sum-card"><div class="sum-label">💑 共享（她的一半）</div><div class="sum-value">${((data.total_shared||0)*.5).toFixed(2)}</div></div>`

  } else {
    summaryCards = `${netCard}
      <div class="sum-card"><div class="sum-label">${ME.em} ${ME.name}的花费</div><div class="sum-value">$${(data.me_own||0).toFixed(2)}</div></div>
      <div class="sum-card"><div class="sum-label">${PARTNER.em} ${PARTNER.name}的花费</div><div class="sum-value">$${(data.partner_own||0).toFixed(2)}</div></div>
      <div class="sum-card" style="background:var(--primary)"><div class="sum-label" style="color:rgba(255,255,255,.8)">两人合计</div><div class="sum-value" style="color:white">$${(data.combined_total||0).toFixed(2)}</div></div>`;
  }
  const rows = Object.entries(data.by_category||{}).map(([id,v]) => {
    const c = CAT_MAP[id] || {em:'💳', nm:id};
    let amount = (v.me||0)+(v.partner||0)+(v.shared||0);
    return {...c, amount, me:v.me||0, partner:v.partner||0, shared:v.shared||0};
  }).filter(r=>r.amount>0).sort((a,b)=>b.amount-a.amount);
  const rowsHtml = rows.length
    ? rows.map(r=>`<div class="brow" onclick="openCategoryDetail('${r.id}')" style="cursor:pointer">
        <div class="brow-left"><span class="brow-emoji">${r.em}</span><span class="brow-name">${r.nm}</span></div>
        <div class="brow-right">
          <div class="brow-amount">$${r.amount.toFixed(2)} <span style="font-size:11px;color:var(--text2)">›</span></div>
          <div class="brow-sub">${[r.me?`我 ${r.me.toFixed(2)}`:'',r.partner?`她 ${r.partner.toFixed(2)}`:'',r.shared?`共 ${r.shared.toFixed(2)}`:''].filter(Boolean).join(' · ')}</div>
        </div></div>`).join('')
    : '<p style="text-align:center;color:var(--text2);padding:20px">本月暂无已分类记录</p>';
  document.getElementById('reportContent').innerHTML = `
    <div class="summary-grid">${summaryCards}</div>
    <div class="breakdown-card"><h3>按类别明细</h3>${rowsHtml}</div>
    <div class="report-footer">共 ${data.transaction_count} 笔已分类</div>`;
}

async function deleteAccountPrompt() {
  try {
    const accounts = await (await fetch('/api/accounts')).json();
    if (!accounts.length) { toast('没有可删除的账户'); return; }
    let target;
    if (accounts.length === 1) {
      if (!confirm(`删除账户「${accounts[0].name}」？\n\n已分类记录完全保留，未分类待处理的会被清除。\n删除后点「＋ 连接新账户」重新连接即可获取2年历史。`)) return;
      target = accounts[0];
    } else {
      const names = accounts.map((a,i)=>`${i+1}. ${a.name} (${a.owner==='me'?'恐龙公主':'野猪公主'})`).join('\n');
      const idx = parseInt(prompt(`选择要删除的账户（输入序号）：\n${names}`)) - 1;
      if (isNaN(idx) || idx < 0 || idx >= accounts.length) return;
      if (!confirm(`删除「${accounts[idx].name}」？\n已分类记录保留，未分类记录清除。`)) return;
      target = accounts[idx];
    }
    const r = await fetch('/api/delete_account', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({item_id: target.item_id})
    });
    const data = await r.json();
    if (data.success) {
      toast(`✅ 已删除「${data.account}」，请重新连接`);
      loadAccounts();
    } else { toast('❌ 删除失败'); }
  } catch(e) { toast('❌ 操作失败'); }
}

let recatTxnId = null, recatSplit = null, recatCat = null;

function openRecat(txnId) {
  const txn = catDetailTxns.find(t => t.id === txnId);
  if (!txn) return;
  recatTxnId = txnId;
  recatSplit = txn.split || null;
  recatCat   = txn.category || null;
  document.getElementById('recatSub').textContent = `${txn.name} · $${txn.amount.toFixed(2)}`;
  ['mine','shared','theirs'].forEach(s =>
    document.getElementById('recat-'+s).classList.toggle('sel', s === recatSplit));
  document.getElementById('recatCatGrid').innerHTML =
    `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">` +
    CATEGORIES.map(c => {
      const isSel = c.id === recatCat;
      return `<button class="cat-btn${isSel?' sel':''}" onclick="selectRecatCat('${c.id}',this)">
        <span class="em">${c.em}</span><span class="nm">${c.nm}</span>
      </button>`;
    }).join('') + `</div>`;
  updateRecatConfirmBtn();
  document.getElementById('recatOverlay').classList.add('show');
}

function selectRecatSplit(s) {
  recatSplit = s;
  ['mine','shared','theirs'].forEach(id =>
    document.getElementById('recat-'+id).classList.toggle('sel', id===s));
  updateRecatConfirmBtn();
}

function selectRecatCat(id, el) {
  document.querySelectorAll('#recatCatGrid .cat-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  recatCat = id;
  updateRecatConfirmBtn();
}

function updateRecatConfirmBtn() {
  const btn = document.getElementById('recatConfirmBtn');
  const ready = recatSplit && recatCat;
  btn.disabled = !ready;
  if (ready) {
    const c = CAT_MAP[recatCat];
    const sLabel = recatSplit==='mine'?`🦕 我的`:recatSplit==='theirs'?`🐗 TA的`:`💑 共享`;
    btn.textContent = `确认 — ${c.em} ${c.nm} · ${sLabel}`;
  } else {
    btn.textContent = '请先选择';
  }
}

async function confirmRecat() {
  if (!recatSplit || !recatCat || !recatTxnId) return;
  document.getElementById('recatOverlay').classList.remove('show');
  try {
    await fetch('/api/categorize', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id:recatTxnId, split:recatSplit, category:recatCat})
    });
    const c = CAT_MAP[recatCat];
    toast(`✅ 已更新 ${c.em} ${c.nm}`);
    // Refresh detail list
    if (currentDetailCat) {
      const r = await fetch(`/api/transactions?month=${currentMonth}&category=${currentDetailCat}&all=true`);
      catDetailTxns = await r.json();
      if (recatCat !== currentDetailCat) {
        // Transaction moved to different category — close detail & reload report
        closeCatDetail();
        loadReport();
      } else {
        renderCategoryDetail(catDetailTxns, currentDetailCat);
        loadReport(); // refresh totals in background
      }
    }
  } catch(e) { toast('❌ 更新失败'); }
}

document.getElementById('recatOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('recatOverlay'))
    document.getElementById('recatOverlay').classList.remove('show');
});

async function loadAccountStats() {

    const stats = await (await fetch('/api/account_stats')).json();

function renderAccountStats(stats) {
  const byOwner = { me: {}, partner: {} };
  stats.forEach(s => {
    const owner = s.owner || 'me';
    if (!byOwner[owner][s.account]) byOwner[owner][s.account] = [];
    byOwner[owner][s.account].push(s);
  });

  let html = `<div class="card" style="padding:16px 18px 10px">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:14px">各账户月度交易量</h3>`;

  const ownerConfig = [
    { key: 'me', label: ME.em + ' ' + ME.name },
    { key: 'partner', label: PARTNER.em + ' ' + PARTNER.name }
  ];

  for (const { key, label } of ownerConfig) {
    const accounts = byOwner[key];
    if (Object.keys(accounts).length === 0) continue;
    html += `<div style="margin-bottom:10px;font-size:13px;font-weight:700;color:var(--text2)">${label}</div>`;
    for (const [acc, months] of Object.entries(accounts)) {
      html += `<div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;margin-bottom:6px">${acc}</div>`;
      months.slice(0,6).forEach(m => {
        const pct = m.total > 0 ? Math.round((m.done/m.total)*100) : 0;
        const pending = m.total - m.done;
        const badge = m.total > 0 && pct < 100
          ? `<span style="background:#FF3B30;color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:4px">${pending}笔</span>`
          : pending > 0
          ? `<span style="background:#FF9F0A;color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:4px">${pending}笔</span>`
          : '';
        const label = m.month;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border)">
        <span style="color:var(--text2)">${label}</span>
        <span style="font-weight:600">${m.total}条 ${badge}</span>
      </div>`;
      });
      html += '</div>';
    }
    html += '<div style="height:8px"></div>';
  }
  html += '</div>';
  document.getElementById('accountStats').innerHTML = html;
}

// ══ INIT ══
document.addEventListener('DOMContentLoaded', async () => {
  handleOAuthRedirect();
  updateSettlementUI();
  fetch('/api/reclassify', {method:'POST'}).catch(()=>{});
  await loadMonthList();
  const _now = new Date();
  currentMonth = `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;
  loadReport();
  updateUndoBtn();
});
</script>
